<!-- Desktop Navbar -->
<div class="hidden md:block">
    <app-navbar></app-navbar>
</div>



<!-- Mobile Header -->
<div class="md:hidden bg-blue-700 text-white p-4 flex items-center gap-4">

    <button
        (click)="toggleSidebar()"
        class="text-2xl">

        ☰

    </button>


    <h1 class="font-bold text-lg">
        IT Asset Management
    </h1>

</div>




<!-- Layout -->

<div class="flex">


    <!-- Desktop Sidebar -->

    <aside class="hidden md:block w-64 min-h-screen bg-slate-800">

        <app-sidebar></app-sidebar>

    </aside>




    <!-- Mobile Sidebar -->

    @if(sidebarOpen){

        <div
            class="fixed inset-0 bg-black bg-opacity-50 z-40"
            (click)="closeSidebar()">
        </div>


        <aside
            class="fixed top-0 left-0 h-full w-64 bg-slate-800 text-white z-50">

            <app-sidebar></app-sidebar>

        </aside>

    }




    <!-- Content -->

    <main class="flex-1 p-6">

        <router-outlet></router-outlet>

    </main>


</div>
