<div class="p-8">

    <div class="flex justify-between items-center mb-6">

        <h1 class="text-3xl font-bold">
            Departments
        </h1>

        <a
            routerLink="/departments/add"
            class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded">

            Add Department

        </a>

    </div>



    <div
        *ngIf="loading"
        class="text-center text-gray-600 text-lg">

        Loading...

    </div>



    <table
        *ngIf="!loading"
        class="w-full bg-white shadow rounded-lg overflow-hidden">

        <thead class="bg-gray-100">

            <tr>

                <th class="p-3 text-left">
                    Name
                </th>

                <th class="p-3 text-left">
                    Manager
                </th>

                <th class="p-3 text-left">
                    Location
                </th>

                <th class="p-3 text-left">
                    Status
                </th>

                <th class="p-3 text-center">
                    Actions
                </th>

            </tr>

        </thead>


        <tbody>

            <tr
                *ngFor="let department of departments"
                class="border-b hover:bg-gray-50">

                <td class="p-3">

                    {{ department.name }}

                </td>


                <td class="p-3">

                    {{ department.manager }}

                </td>


                <td class="p-3">

                    {{ department.location }}

                </td>


                <td class="p-3">

                    <span
                        class="bg-green-100 text-green-700 px-3 py-1 rounded-full">

                        {{ department.status }}

                    </span>

                </td>


                <td
                    class="p-3 flex justify-center gap-3">

                    <a
                        [routerLink]="['/departments/edit', department._id]"
                        class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded">

                        Edit

                    </a>


                    <button
                        (click)="deleteDepartment(department._id)"
                        class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">

                        Delete

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>
