<div class="p-8">

  <div class="flex justify-between items-center mb-6">

    <h1 class="text-3xl font-bold">
      Departments
    </h1>

    <div class="flex gap-3">

      <button
        type="button"
        (click)="loadDepartments()"
        class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded">

        Refresh

      </button>

      <button
        type="button"
        (click)="goToAddDepartment()"
        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded">

        + Add Department

      </button>

    </div>

  </div>

  <!-- Debug -->
  <div class="mb-4 p-4 bg-yellow-100 rounded">

    <p><strong>Loading:</strong> {{ loading }}</p>

    <p><strong>Departments Count:</strong> {{ departments.length }}</p>

  </div>

  <!-- Error -->

  <div
    *ngIf="error"
    class="bg-red-100 text-red-700 p-3 rounded mb-4">

    {{ error }}

  </div>

  <!-- Loading -->

  <div
    *ngIf="loading"
    class="text-center text-lg py-10">

    Loading Departments...

  </div>

  <!-- Empty -->

  <div
    *ngIf="!loading && departments.length === 0"
    class="text-center text-gray-500 py-10">

    No Departments Found

  </div>

  <!-- Table -->

  <table
    *ngIf="!loading && departments.length > 0"
    class="w-full bg-white shadow rounded-lg overflow-hidden">

    <thead class="bg-blue-600 text-white">

      <tr>

        <th class="p-3 text-left">Name</th>
        <th class="p-3 text-left">Manager</th>
        <th class="p-3 text-left">Location</th>
        <th class="p-3 text-left">Status</th>
        <th class="p-3 text-center">Actions</th>

      </tr>

    </thead>

    <tbody>

      <tr
        *ngFor="let department of departments"
        class="border-b hover:bg-gray-100">

        <td class="p-3">

          {{ department.name }}

        </td>

        <td class="p-3">

          {{ department.manager }}

        </td>

        <td class="p-3">

          {{ department.location }}

        </td>

        <td class="p-3">

          <span
            class="px-3 py-1 rounded-full"
            [ngClass]="{
              'bg-green-100 text-green-700': department.status === 'Active',
              'bg-red-100 text-red-700': department.status === 'Inactive'
            }">

            {{ department.status }}

          </span>

        </td>

        <td class="p-3 flex justify-center gap-2">

          <button
            (click)="goToEditDepartment(department)"
            class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded">

            Edit

          </button>

          <button
            (click)="deleteDepartment(department._id)"
            class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">

            Delete

          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
