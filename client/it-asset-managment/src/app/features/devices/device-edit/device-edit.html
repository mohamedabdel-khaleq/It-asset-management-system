<div class="max-w-4xl mx-auto p-8">

    <div class="flex justify-between items-center mb-6">

        <h1 class="text-3xl font-bold">
            Edit Device
        </h1>

        <a
            routerLink="/devices"
            class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded">
            Back
        </a>

    </div>

    <form
        (ngSubmit)="updateDevice()"
        class="bg-white shadow rounded-lg p-6 space-y-5">

        <div>

            <label class="block mb-2 font-semibold">
                Asset Tag
            </label>

            <input
                type="text"
                [(ngModel)]="device.assetTag"
                name="assetTag"
                class="w-full border rounded px-4 py-2">

        </div>


        <div>

            <label class="block mb-2 font-semibold">
                Device Name
            </label>

            <input
                type="text"
                [(ngModel)]="device.deviceName"
                name="deviceName"
                class="w-full border rounded px-4 py-2">

        </div>


        <div>

            <label class="block mb-2 font-semibold">
                Category
            </label>

            <input
                type="text"
                [(ngModel)]="device.category"
                name="category"
                class="w-full border rounded px-4 py-2">

        </div>


        <div>

            <label class="block mb-2 font-semibold">
                Brand
            </label>

            <input
                type="text"
                [(ngModel)]="device.brand"
                name="brand"
                class="w-full border rounded px-4 py-2">

        </div>


        <div>

            <label class="block mb-2 font-semibold">
                Model
            </label>

            <input
                type="text"
                [(ngModel)]="device.model"
                name="model"
                class="w-full border rounded px-4 py-2">

        </div>


        <div>

            <label class="block mb-2 font-semibold">
                Serial Number
            </label>

            <input
                type="text"
                [(ngModel)]="device.serialNumber"
                name="serialNumber"
                class="w-full border rounded px-4 py-2">

        </div>


        <div>

            <label class="block mb-2 font-semibold">
                Purchase Date
            </label>

            <input
                type="date"
                [(ngModel)]="device.purchaseDate"
                name="purchaseDate"
                class="w-full border rounded px-4 py-2">

        </div>


        <div>

            <label class="block mb-2 font-semibold">
                Warranty Expiry
            </label>

            <input
                type="date"
                [(ngModel)]="device.warrantyExpiry"
                name="warrantyExpiry"
                class="w-full border rounded px-4 py-2">

        </div>


        <div>

            <label class="block mb-2 font-semibold">
                Status
            </label>

            <select
                [(ngModel)]="device.status"
                name="status"
                class="w-full border rounded px-4 py-2">

                <option value="Available">Available</option>
                <option value="Assigned">Assigned</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Retired">Retired</option>

            </select>

        </div>


        <div>

            <label class="block mb-2 font-semibold">
                Notes
            </label>

            <textarea
                rows="4"
                [(ngModel)]="device.notes"
                name="notes"
                class="w-full border rounded px-4 py-2">
            </textarea>

        </div>

        <div
            *ngIf="error"
            class="bg-red-100 text-red-700 p-3 rounded">

            {{ error }}

        </div>

        <button
            type="submit"
            [disabled]="loading"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded">

            {{ loading ? 'Updating...' : 'Update Device' }}

        </button>

    </form>

</div>
