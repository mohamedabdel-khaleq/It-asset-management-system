<div class="max-w-4xl mx-auto bg-white shadow-lg rounded-xl p-8 mt-8">
  <h2 class="text-3xl font-bold mb-6 text-blue-700">Edit Employee</h2>

  @if (error) {
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-5">
      {{ error }}
    </div>
  }

  @if (loading) {
    <div class="text-center py-10 text-lg">Loading employee...</div>
  } @else if (!loading && error) {
    <div class="text-center py-10 text-lg text-red-600">{{ error }}</div>
  } @else {
    <form (ngSubmit)="updateEmployee()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block mb-2 font-semibold">Employee ID</label>
          <input type="text" [(ngModel)]="employee.employeeId" name="employeeId" class="w-full border rounded-lg p-3" required>
        </div>

        <div>
          <label class="block mb-2 font-semibold">Full Name</label>
          <input type="text" [(ngModel)]="employee.fullName" name="fullName" class="w-full border rounded-lg p-3" required>
        </div>

        <div>
          <label class="block mb-2 font-semibold">Email</label>
          <input type="email" [(ngModel)]="employee.email" name="email" class="w-full border rounded-lg p-3" required>
        </div>

        <div>
          <label class="block mb-2 font-semibold">Phone</label>
          <input type="text" [(ngModel)]="employee.phone" name="phone" class="w-full border rounded-lg p-3" required>
        </div>

        <div>
          <label class="block mb-2 font-semibold">Department</label>
          <input type="text" [(ngModel)]="employee.department" name="department" class="w-full border rounded-lg p-3" required>
        </div>

        <div>
          <label class="block mb-2 font-semibold">Job Title</label>
          <input type="text" [(ngModel)]="employee.jobTitle" name="jobTitle" class="w-full border rounded-lg p-3" required>
        </div>

        <div>
          <label class="block mb-2 font-semibold">Status</label>
          <select [(ngModel)]="employee.status" name="status" class="w-full border rounded-lg p-3">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
      </div>

      <div class="flex gap-4 mt-8">
        <button type="submit" [disabled]="loading" class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white px-6 py-3 rounded-lg">
          {{ loading ? 'Updating...' : 'Update Employee' }}
        </button>

        <button type="button" routerLink="/employees" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-lg">
          Cancel
        </button>
      </div>
    </form>
  }
</div>
